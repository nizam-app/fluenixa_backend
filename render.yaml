# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flunexia-api
    env: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/v1/health
    buildCommand: npm ci
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: "true"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_BOOTSTRAP_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: Flunexia
      - key: APP_URL
        sync: false
